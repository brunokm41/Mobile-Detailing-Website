<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Detailing Tauranga — Coming Soon</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C; --gold-light: #E2C47A; --dark: #0A0A0A;
      --dark-3: #1A1A1A; --text: #cacaca; --text-muted: #888880;
      --border: rgba(201,168,76,0.2);
    }
    html, body { height: 100%; }
    body {
      background: var(--dark); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      min-height: 100svh; overflow: hidden;
    }
    .bg-lines {
      position: fixed; inset: 0; opacity: 0.03; pointer-events: none;
      background-image: repeating-linear-gradient(90deg, #C9A84C 0px, #C9A84C 1px, transparent 1px, transparent 60px);
    }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(201,168,76,0.06) 0%, transparent 70%);
    }
    .card {
      position: relative; z-index: 2; text-align: center;
      padding: 4rem 3rem; border: 1px solid var(--border);
      background: var(--dark-3); max-width: 520px; width: 90%;
      animation: fadeUp 0.8s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo { margin-bottom: 2rem; display: flex; justify-content: center; }
    .logo img { height: 48px; width: auto; display: block; margin: 0 auto; }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.12em; color: var(--gold); }
    .divider { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 2rem; }
    
    .eyebrow { 
        font-size: 0.72rem; 
        letter-spacing: 0.2em; 
        text-transform: uppercase; 
        color: var(--gold); 
        margin-bottom: 2rem; 
    }
    
    h1 { 
        font-family: 'Bebas Neue', sans-serif; 
        font-size: clamp(3rem, 8vw, 4rem); 
        letter-spacing: 0.05em; 
        line-height: 1; 
        color: var(--text); 
        margin-bottom: 1.25rem; 
    
    }
    p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.75; margin-bottom: 2.5rem; }
    .contact-row { display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-size: 1.1rem; font-weight: 400; color: var(--text-muted); padding: 0.75rem 0; border-top: 1px solid rgba(255,255,255,0.05); }
    .contact-row:last-of-type { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .contact-row a { color: var(--gold); text-decoration: none; transition: color 0.2s; }
    .contact-row a:hover { color: var(--gold-light); }
    .contact-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); opacity: 0.6; min-width: 50px; text-align: right; }
    .footer-note { margin-top: 2rem; font-size: 0.72rem; color: var(--text-muted); opacity: 0.4; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <div class="bg-lines"></div>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="logo">
      <img src="images/logo.svg" alt="Mobile Detailing Tauranga"
           onerror="this.style.display='none'; document.querySelector('.logo-text').style.display='block';" />
      <div class="logo-text" style="display:none;">Mobile Detailing Tauranga</div>
    </div>
    <!-- <div class="divider"></div> -->
    <div class="eyebrow">Tauranga & Mount Maunganui</div>
    <h1>We're Almost Ready</h1>
    <p>Our new website is under construction. In the meantime, feel free to get in touch to book your detail or ask any questions.</p>
    <div class="contact-row">
      <span class="contact-label">Call</span>
      <a href="tel:021 026 54050">021 026 54050</a>
    </div>
    <div class="contact-row">
      <span class="contact-label">Email</span>
      <a href="mailto:info@mobiledetailing.co.nz">info@mobiledetailing.co.nz</a>
    </div>
    <div class="footer-note">Mobile Detailing Tauranga — Bay of Plenty</div>
  </div>
</body>
</html>
